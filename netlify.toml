[build]
command = "vp run build"
publish = "dist"

[[headers]]
for = "/resume/txt"
[headers.values]
Content-Type = "text/plain; charset=UTF-8"
Content-Disposition = 'attachment; filename="chris-klink-resume.txt"'

# Redirect www to apex domain
[[redirects]]
from = "https://www.klink.ing/*"
to = "https://klink.ing/:splat"
status = 301
force = true

